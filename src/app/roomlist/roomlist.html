<section class="container my-4">
  @if (roomSearchResults && roomSearchResults.length > 0) {
    <div class="row g-4">
      @for (room of roomSearchResults; track room.id) {
        <div class="col-md-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <img [src]="room.imageUrl"
                 [alt]="room.roomNumber"
                 class="card-img-top object-fit-cover"
                 style="height: 200px;">

            <div class="card-body d-flex flex-column">
              <h5 class="card-title">{{ room.type }}</h5>
              <p class="card-text text-muted mb-1">
                <strong>Price:</strong> ${{ room.pricePerNight }}/Night
              </p>
              <p class="card-text small flex-grow-1">
                {{ room.description }}
              </p>

              <div class="mt-3">
                @if (isAdmin) {
                  <button class="btn btn-outline-primary w-100"
                          (click)="navigateToEditRoom(room.id)">
                    <i class="bi bi-pencil-square me-1"></i> Edit Room
                  </button>
                } @else {
                  <button class="btn btn-primary w-100"
                          (click)="navigateToRoomDetails(room.id)">
                    View / Book Now
                  </button>
                }
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  } @else {
    <div class="text-center py-5">
      <p class="text-muted">No rooms found matching your criteria.</p>
    </div>
  }
</section>
