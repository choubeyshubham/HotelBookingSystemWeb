<nav class="navbar navbar-expand-lg shadow-sm border-bottom app-navbar">
  <div class="container">
    <a class="navbar-brand fw-semibold d-flex align-items-center gap-0" routerLink="/home">
      <img
        class="brand-logo"
        src="assets/cgh_logo.svg"
        alt="Champaran Guest House logo"
        width="60"
        height="60"
      />
      <span class="brand-title">Champaran Guest House</span>
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNavbar"
      aria-controls="mainNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-lg-end" id="mainNavbar">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2 mt-2 mt-lg-0">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/home"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <i class="bi bi-house-door me-1"></i>Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/rooms" routerLinkActive="active">
            <i class="bi bi-door-open me-1"></i>Rooms
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/find-booking" routerLinkActive="active">
            <i class="bi bi-search me-1"></i>Find Booking
          </a>
        </li>

        @if (isCustomer) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/profile" routerLinkActive="active">
              <i class="bi bi-person-circle me-1"></i>Profile
            </a>
          </li>
        }
        @if (isAdmin) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin" routerLinkActive="active">
              <i class="bi bi-speedometer2 me-1"></i>Admin
            </a>
          </li>
        }
        @if (isAuthenticated) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">
              <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </a>
          </li>
        }
        @if (isAuthenticated) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/register" routerLinkActive="active">
              <i class="bi bi-person-plus me-1"></i>Register
            </a>
          </li>
        }
        @if (isAuthenticated) {
          <li class="nav-item ms-lg-2">
            <button type="button" class="btn btn-outline-danger btn-sm" (click)="handleLogout()">
              <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
